<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script type="text/javascript">
    (function() {
      let path = window.location.pathname;
      if (!path.includes('/dashboard/')) {
        if (path.endsWith('index.html')) {
          path = path.substring(0, path.length - 10);
        }
        if (!path.endsWith('/')) {
          path += '/';
        }
        window.location.replace(path + "dashboard/index.html");
      }
    })();
  </script>
  <title>Redirecting to Dashboard</title>
</head>
<body>
  <p>Redirecting you to the analytics dashboard... If you are not redirected, please click <a href="./dashboard/index.html">here</a>.</p>
</body>
</html>
